<p-splitter [panelSizes]="[30, 40, 30]" [style]="{ height: '360px' }">
  <ng-template #panel></ng-template>

  <ng-template #panel>
    <p-multiselect
      [options]="checkboxMenuItems"
      [(ngModel)]="selectedItems"
      optionLabel="name"
      placeholder="Select columns"
      [maxSelectedLabels]="2"
    />
  </ng-template>

  <ng-template #panel></ng-template>
</p-splitter>
