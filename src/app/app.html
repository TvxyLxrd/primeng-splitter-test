<main class="screen-frame">
  <p-button
    class="sidebar-toggle"
    icon="pi pi-bars"
    [text]="true"
    [rounded]="true"
    ariaLabel="Toggle groups panel"
    (click)="toggleSidebar()"
  />

  <div #splitterArea class="splitter-area">
    @if (sidebarOpen()) {
      <p-splitter
        styleClass="app-splitter outer-splitter"
        [gutterSize]="1"
        [panelSizes]="outerPanelSizes()"
        [minSizes]="[0, 0]"
      >
        <ng-template #panel></ng-template>

        <ng-template #panel>
          <p-splitter
            styleClass="app-splitter"
            layout="vertical"
            [panelSizes]="verticalPanelSizes"
            [minSizes]="[0, 0]"
          >
            <ng-template #panel>
              <p-splitter
                styleClass="app-splitter"
                [panelSizes]="topPanelSizes"
                [minSizes]="[0, 0]"
              >
                <ng-template #panel></ng-template>
                <ng-template #panel></ng-template>
              </p-splitter>
            </ng-template>

            <ng-template #panel></ng-template>
          </p-splitter>
        </ng-template>
      </p-splitter>
    } @else {
      <p-splitter
        styleClass="app-splitter outer-splitter"
        [gutterSize]="1"
        [panelSizes]="[100]"
        [minSizes]="[0]"
      >
        <ng-template #panel>
          <p-splitter
            styleClass="app-splitter"
            layout="vertical"
            [panelSizes]="verticalPanelSizes"
            [minSizes]="[0, 0]"
          >
            <ng-template #panel>
              <p-splitter
                styleClass="app-splitter"
                [panelSizes]="topPanelSizes"
                [minSizes]="[0, 0]"
              >
                <ng-template #panel></ng-template>
                <ng-template #panel></ng-template>
              </p-splitter>
            </ng-template>

            <ng-template #panel></ng-template>
          </p-splitter>
        </ng-template>
      </p-splitter>
    }
  </div>
</main>
