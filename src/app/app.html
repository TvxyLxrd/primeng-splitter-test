<main class="screen-frame">
  <p-button
    class="sidebar-toggle"
    icon="pi pi-bars"
    [text]="true"
    [rounded]="true"
    ariaLabel="Toggle groups panel"
    (click)="toggleSidebar()"
  />

  <div #splitterArea class="splitter-area">
    <p-splitter
      styleClass="app-splitter root-splitter"
      layout="vertical"
      [panelSizes]="verticalPanelSizes"
      [minSizes]="[0, 0]"
    >
      <ng-template #panel>
        @if (sidebarOpen()) {
          <p-splitter
            styleClass="app-splitter sidebar-splitter"
            [gutterSize]="1"
            [panelSizes]="outerPanelSizes()"
            [minSizes]="[0, 0]"
          >
            <ng-template #panel>
              <div class="tree-panel">
                <p-select
                  styleClass="tree-select"
                  panelStyleClass="tree-select-panel"
                  size="small"
                  appendTo="body"
                  [(ngModel)]="selectedTree"
                  [options]="treeOptions"
                  optionLabel="name"
                />
              </div>
            </ng-template>

            <ng-template #panel>
              <p-splitter
                styleClass="app-splitter worktop-splitter"
                [panelSizes]="topPanelSizes"
                [minSizes]="[0, 0]"
              >
                <ng-template #panel></ng-template>
                <ng-template #panel></ng-template>
              </p-splitter>
            </ng-template>
          </p-splitter>
        } @else {
          <p-splitter
            styleClass="app-splitter worktop-splitter"
            [panelSizes]="topPanelSizes"
            [minSizes]="[0, 0]"
          >
            <ng-template #panel></ng-template>
            <ng-template #panel></ng-template>
          </p-splitter>
        }
      </ng-template>

      <ng-template #panel></ng-template>
    </p-splitter>
  </div>
</main>
