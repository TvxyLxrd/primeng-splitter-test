<main #splitterFrame class="screen-frame">
  @if (sidebarOpen()) {
    <p-splitter
      styleClass="root-splitter"
      [panelSizes]="outerPanelSizes()"
      [minSizes]="[0, 0]"
    >
      <ng-template #panel>
        <div class="splitter-cell">
          <p-tree [value]="treeNodes" />
        </div>
      </ng-template>

      <ng-template #panel>
        <p-splitter
          styleClass="nested-splitter"
          layout="vertical"
          [panelSizes]="mainPanelSizes"
          [minSizes]="[0, 0]"
        >
          <ng-template #panel>
            <p-splitter
              styleClass="nested-splitter"
              [panelSizes]="workPanelSizes"
              [minSizes]="[0, 0]"
            >
              <ng-template #panel>
                <div class="splitter-cell">
                  <p-button
                    icon="pi pi-bars"
                    [text]="true"
                    [rounded]="true"
                    ariaLabel="Toggle groups panel"
                    (click)="toggleSidebar()"
                  />

                  <p-multiselect
                    [options]="checkboxMenuItems"
                    [(ngModel)]="selectedItems"
                    optionLabel="name"
                    placeholder="Select columns"
                    [maxSelectedLabels]="2"
                  />
                </div>
              </ng-template>

              <ng-template #panel>
                <div class="splitter-cell"></div>
              </ng-template>
            </p-splitter>
          </ng-template>

          <ng-template #panel>
            <div class="splitter-cell"></div>
          </ng-template>
        </p-splitter>
      </ng-template>
    </p-splitter>
  } @else {
    <p-splitter
      styleClass="root-splitter"
      [panelSizes]="outerPanelSizes()"
      [minSizes]="[0]"
    >
      <ng-template #panel>
        <p-splitter
          styleClass="nested-splitter"
          layout="vertical"
          [panelSizes]="mainPanelSizes"
          [minSizes]="[0, 0]"
        >
          <ng-template #panel>
            <p-splitter
              styleClass="nested-splitter"
              [panelSizes]="workPanelSizes"
              [minSizes]="[0, 0]"
            >
              <ng-template #panel>
                <div class="splitter-cell">
                  <p-button
                    icon="pi pi-bars"
                    [text]="true"
                    [rounded]="true"
                    ariaLabel="Toggle groups panel"
                    (click)="toggleSidebar()"
                  />

                  <p-multiselect
                    [options]="checkboxMenuItems"
                    [(ngModel)]="selectedItems"
                    optionLabel="name"
                    placeholder="Select columns"
                    [maxSelectedLabels]="2"
                  />
                </div>
              </ng-template>

              <ng-template #panel>
                <div class="splitter-cell"></div>
              </ng-template>
            </p-splitter>
          </ng-template>

          <ng-template #panel>
            <div class="splitter-cell"></div>
          </ng-template>
        </p-splitter>
      </ng-template>
    </p-splitter>
  }
</main>
