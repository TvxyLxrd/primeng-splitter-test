<main #splitterFrame class="screen-frame">
  @if (sidebarOpen()) {
    <p-splitter
      styleClass="full-height"
      [panelSizes]="outerPanelSizes()"
      [minSizes]="[0, 0]"
    >
      <ng-template #panel>
        <p-button
          icon="pi pi-bars"
          [text]="true"
          [rounded]="true"
          ariaLabel="Toggle groups panel"
          (click)="toggleSidebar()"
        />

        <p-tree [value]="treeNodes" />
      </ng-template>

      <ng-template #panel>
        <p-splitter
          styleClass="full-height"
          layout="vertical"
          [panelSizes]="mainPanelSizes"
          [minSizes]="[0, 0]"
        >
          <ng-template #panel>
            <p-splitter
              styleClass="full-height"
              [panelSizes]="workPanelSizes"
              [minSizes]="[0, 0]"
            >
              <ng-template #panel>
                <p-multiselect
                  [options]="checkboxMenuItems"
                  [(ngModel)]="selectedItems"
                  optionLabel="name"
                  placeholder="Select columns"
                  [maxSelectedLabels]="2"
                />
              </ng-template>

              <ng-template #panel></ng-template>
            </p-splitter>
          </ng-template>

          <ng-template #panel></ng-template>
        </p-splitter>
      </ng-template>
    </p-splitter>
  } @else {
    <p-splitter
      styleClass="full-height"
      [panelSizes]="outerPanelSizes()"
      [minSizes]="[0]"
    >
      <ng-template #panel>
        <p-splitter
          styleClass="full-height"
          layout="vertical"
          [panelSizes]="mainPanelSizes"
          [minSizes]="[0, 0]"
        >
          <ng-template #panel>
            <p-splitter
              styleClass="full-height"
              [panelSizes]="workPanelSizes"
              [minSizes]="[0, 0]"
            >
              <ng-template #panel>
                <p-button
                  icon="pi pi-bars"
                  [text]="true"
                  [rounded]="true"
                  ariaLabel="Toggle groups panel"
                  (click)="toggleSidebar()"
                />

                <p-multiselect
                  [options]="checkboxMenuItems"
                  [(ngModel)]="selectedItems"
                  optionLabel="name"
                  placeholder="Select columns"
                  [maxSelectedLabels]="2"
                />
              </ng-template>

              <ng-template #panel></ng-template>
            </p-splitter>
          </ng-template>

          <ng-template #panel></ng-template>
        </p-splitter>
      </ng-template>
    </p-splitter>
  }
</main>
